<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Consulta de licitación</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      label { display:block; margin-top: 0.5rem }
      textarea { width:100%; height:120px }
      input[type=text], input[type=number] { width:100%; padding:0.4rem }
      button { margin-top:1rem; padding:0.6rem 1rem }
    </style>
  </head>
  <body>
    <p style="font-size:0.85rem"><a href="/omnitab">→ Consultar itemizado con OmniTab (lenguaje natural)</a></p>
    <p style="font-size:0.85rem"><a href="/buscar">→ Búsqueda semántica FAISS+SBERT (bases técnicas ↔ itemizado)</a></p>
    <p style="font-size:0.85rem"><a href="/valorizar">→ Búsqueda semántica XGboost (itemizado)</a></p>
    <h1>Ingresar información de ítem</h1>
    <form method="post" action="/predict">
      <label>Descripción / Alcance</label>
      <textarea name="description" placeholder="Ej: Excavación de zanja en la zona norte"></textarea>

      <label>Volumen (ej. m3)</label>
      <input type="text" name="volume" />

      <label>Año de ejecución</label>
      <input type="text" name="year" />

      <label>IPC (factor, p.ej. 0.12 para 12%)</label>
      <input type="text" name="ipc" />

      <button type="submit">Consultar</button>
    </form>
  </body>
</html>
